<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbet Programı - Görüntüleme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-content h1 {
            color: #1F2937;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .header-content p {
            color: #6B7280;
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-logout {
            background: #DC2626;
            color: white;
        }

        .btn-logout:hover {
            background: #991B1B;
            transform: translateY(-2px);
        }

        .btn-refresh {
            background: #8B5CF6;
            color: white;
        }

        .btn-refresh:hover {
            background: #7C3AED;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.1rem;
        }

        .no-data {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            color: #6B7280;
            font-size: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .no-data h2 {
            color: #1F2937;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        /* Tablo Stilleri */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header {
            padding: 1rem;
            background: #F9FAFB;
            border-bottom: 2px solid #E5E7EB;
            color: #6B7280;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
            max-height: 70vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead {
            background: white;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        th {
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 600;
            color: white;
            font-size: 0.75rem;
            border-bottom: 2px solid #E5E7EB;
            word-break: break-word;
            max-width: 80px;
            line-height: 1.2;
        }

        th:first-child {
            min-width: 90px;
            background: #F9FAFB;
            color: #1F2937;
            text-align: left;
            padding-left: 1rem;
        }

        th:nth-child(n+2) {
            background: white;
            height: 80px;
            vertical-align: bottom;
            padding-bottom: 0.75rem;
        }

        tbody tr {
            border-bottom: 1px solid #E5E7EB;
        }

        tbody tr:hover {
            background: #F9FAFB;
        }

        td {
            padding: 0.75rem 0.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #374151;
            border: 1px solid #E5E7EB;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        td:first-child {
            text-align: left;
            padding-left: 1rem;
            background: #F9FAFB;
            color: #1F2937;
            font-weight: 500;
            font-size: 0.85rem;
        }

        /* Hücre Stilleri */
        .cell-shift {
            border-radius: 4px;
            color: white;
            font-weight: 600;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell-empty {
            background: white;
        }

        .cell-excuse {
            background: #D1D5DB;
        }

        /* Hekim Başlığı */
        .physician-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: white;
        }

        .physician-name {
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
        }

        .physician-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 2px solid rgba(255,255,255,0.5);
        }

        /* Info Banner */
        .info-banner {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .info-banner-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .month-year {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1F2937;
        }

        .month-year-subtitle {
            font-size: 0.85rem;
            color: #6B7280;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-content h1 {
                font-size: 1.2rem;
            }

            .table-scroll {
                max-height: 60vh;
            }

            th:first-child {
                min-width: 80px;
                padding-left: 0.75rem;
            }

            th:nth-child(n+2) {
                max-width: 70px;
                height: 70px;
            }

            td {
                height: 45px;
            }

            .physician-name {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.25rem;
            }

            .header {
                padding: 1rem;
            }

            .header-content h1 {
                font-size: 1rem;
            }

            .month-year {
                font-size: 1.1rem;
            }

            .table-scroll {
                max-height: 50vh;
            }

            th:first-child {
                min-width: 70px;
                font-size: 0.75rem;
            }

            th:nth-child(n+2) {
                max-width: 60px;
                height: 60px;
                padding: 0.5rem 0.25rem;
            }

            td {
                height: 40px;
                padding: 0.5rem 0.25rem;
                font-size: 0.8rem;
            }

            td:first-child {
                font-size: 0.8rem;
                padding-left: 0.5rem;
            }

            .physician-name {
                font-size: 0.65rem;
            }

            .physician-color-indicator {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = '';

        function NobetView() {
            const [isLoading, setIsLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [publishedData, setPublishedData] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                checkAuthAndLoadData();
            }, []);

            const checkAuthAndLoadData = async () => {
                try {
                    const authResponse = await fetch(`${API_URL}/api/check-auth`, {
                        credentials: 'include'
                    });
                    const authData = await authResponse.json();

                    if (!authData.authenticated) {
                        window.location.href = 'nobet_login.html';
                        return;
                    }

                    setUser(authData.username);

                    const pubResponse = await fetch(`${API_URL}/api/published`, {
                        credentials: 'include'
                    });

                    if (pubResponse.ok) {
                        const pubData = await pubResponse.json();
                        if (pubData.success) {
                            setPublishedData(pubData.data);
                        } else {
                            setError('Henüz yayınlanmış tablo yok');
                        }
                    } else {
                        setError('Tablo yüklenemedi');
                    }
                } catch (err) {
                    console.error('Hata:', err);
                    setError('Bağlantı hatası');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogout = async () => {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.href = 'nobet_login.html';
            };

            const handleRefresh = () => {
                setIsLoading(true);
                checkAuthAndLoadData();
            };

            if (isLoading) {
                return <div className="loading">⏳ Yükleniyor...</div>;
            }

            if (error) {
                return (
                    <div className="container">
                        <div className="header">
                            <div className="header-content">
                                <h1>🏥 Nöbet Programı</h1>
                            </div>
                            <div className="header-actions">
                                <button className="btn btn-logout" onClick={handleLogout}>
                                    Çıkış
                                </button>
                            </div>
                        </div>
                        <div className="no-data">
                            <h2>⚠️ {error}</h2>
                            <p>Yönetici nöbet programını henüz yayınlamadı.</p>
                            <button className="btn btn-refresh" onClick={handleRefresh} style={{marginTop: '1rem'}}>
                                🔄 Yenile
                            </button>
                        </div>
                    </div>
                );
            }

            if (!publishedData) {
                return <div className="loading">📊 Veri bekleniyor...</div>;
            }

            const { physicians = [], schedule = {}, year = 2026, month = 0, daysInMonth = 31, holidays = [] } = publishedData;
            const monthNames = ['OCAK', 'ŞUBAT', 'MART', 'NİSAN', 'MAYIS', 'HAZİRAN',
                              'TEMMUZ', 'AĞUSTOS', 'EYLÜL', 'EKİM', 'KASIM', 'ARALIK'];

            const days = Array.from({length: daysInMonth}, (_, i) => i + 1);
            const excuseCodes = ['YI', 'R', 'EV', 'EI', 'GO', 'MI', 'OI', 'RI', 'SEI', 'KI', 'IK', 'II', 'SI', 'B', 'I', 'X'];

            // Tarihi format et
            const formatDate = (day) => {
                const date = new Date(year, month, day);
                const d = String(date.getDate()).padStart(2, '0');
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const dayNames = ['PAZ', 'PTZ', 'SAL', 'ÇAR', 'PER', 'CUM', 'CMT'];
                return `${d}.${m} ${dayNames[date.getDay()]}`;
            };

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <div className="header-content">
                            <h1>🏥 Nöbet Programı</h1>
                            <p>👤 {user}</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-refresh" onClick={handleRefresh}>
                                🔄 Yenile
                            </button>
                            <button className="btn btn-logout" onClick={handleLogout}>
                                Çıkış
                            </button>
                        </div>
                    </div>

                    {/* Info Banner */}
                    <div className="info-banner">
                        <div className="info-banner-content">
                            <div>
                                <div className="month-year">{monthNames[month]} {year}</div>
                                <div className="month-year-subtitle">Nöbet Programı</div>
                            </div>
                        </div>
                    </div>

                    {/* Tablo */}
                    <div className="table-wrapper">
                        <div className="table-header">
                            <span>📋 {monthNames[month]} {year} Nöbet Programı</span>
                        </div>
                        <div className="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Tarih</th>
                                        {physicians.map(physician => (
                                            <th key={physician.name} style={{background: physician.color}}>
                                                <div className="physician-header">
                                                    <div className="physician-name">{physician.displayName}</div>
                                                    <div className="physician-color-indicator" style={{background: physician.color}}></div>
                                                </div>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {days.map(day => {
                                        const isHoliday = holidays.includes(day);
                                        return (
                                            <tr key={day}>
                                                <td>{formatDate(day)}</td>
                                                {physicians.map(physician => {
                                                    const key = `${physician.name}-${day}`;
                                                    const value = schedule[key] || '';

                                                    let cellClass = 'cell-empty';
                                                    let cellStyle = {};
                                                    let cellContent = '';

                                                    // Mazeret kontrolü
                                                    if (excuseCodes.includes(value)) {
                                                        cellClass = 'cell-excuse';
                                                        cellContent = '';
                                                    } 
                                                    // 24 saat nöbet
                                                    else if (value === '24') {
                                                        cellClass = 'cell-shift';
                                                        cellStyle = {background: physician.color, color: 'white'};
                                                        cellContent = '';
                                                    }
                                                    // 16 saat nöbet
                                                    else if (value === '16') {
                                                        cellClass = 'cell-shift';
                                                        cellStyle = {background: physician.color, color: 'white'};
                                                        cellContent = '16';
                                                    }
                                                    // 8 saat nöbet
                                                    else if (value === '8') {
                                                        cellClass = 'cell-shift';
                                                        cellStyle = {background: physician.color, color: 'white'};
                                                        cellContent = '8';
                                                    }
                                                    // Boş gün
                                                    else {
                                                        cellClass = 'cell-empty';
                                                        cellContent = '';
                                                    }

                                                    return (
                                                        <td key={key} style={cellStyle}>
                                                            <div className={cellClass}>
                                                                {cellContent}
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NobetView />);
    </script>
</body>
</html>
