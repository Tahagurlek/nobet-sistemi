<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbet Programı - Görüntüleme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: #1F2937;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header .month-info {
            color: #6B7280;
            font-size: 1.1rem;
        }

        .schedule-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .schedule-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th {
            background: #667eea;
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .schedule-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #F3F4F6;
        }

        .schedule-table tr:hover {
            background: #F9FAFB;
        }

        .day-header {
            font-weight: 600;
            color: #1F2937;
        }

        .shift-cell {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .shift-24 {
            background: #D1FAE5;
            color: #065F46;
        }

        .shift-16 {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .shift-8 {
            background: #FEF3C7;
            color: #92400E;
        }

        .holiday {
            background: #F3F4F6;
            color: #6B7280;
        }

        .no-data {
            text-align: center;
            padding: 4rem;
            color: #6B7280;
            font-size: 1.1rem;
        }

        .logout-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = 'http://localhost:5000';

        function App() {
            const [publishedData, setPublishedData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            // Sayfa yüklenince auth kontrol et ve veri yükle
            useEffect(() => {
                checkAuthAndLoadData();
            }, []);

            const checkAuthAndLoadData = async () => {
                try {
                    // Auth kontrolü
                    const authResponse = await fetch(`${API_URL}/api/check-auth`, {
                        credentials: 'include'
                    });
                    const authData = await authResponse.json();
                    
                    if (!authData.authenticated) {
                        // Oturum yok, login sayfasına yönlendir
                        window.location.href = 'nobet_login.html';
                        return;
                    }

                    setIsAuthenticated(true);

                    // Yayınlanan veriyi yükle
                    const dataResponse = await fetch(`${API_URL}/api/published`, {
                        credentials: 'include'
                    });
                    const result = await dataResponse.json();
                    
                    if (result.success) {
                        setPublishedData(result.data);
                    }
                } catch (err) {
                    console.error('Hata:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                try {
                    await fetch(`${API_URL}/api/logout`, {
                        method: 'POST',
                        credentials: 'include'
                    });
                    window.location.href = 'nobet_login.html';
                } catch (err) {
                    console.error('Çıkış hatası:', err);
                }
            };

            if (loading) {
                return <div className="no-data">Yükleniyor...</div>;
            }

            if (!publishedData) {
                return (
                    <div className="container">
                        <button className="logout-btn" onClick={handleLogout}>Çıkış</button>
                        <div className="no-data">
                            <h2>📋 Henüz yayınlanmış nöbet programı yok</h2>
                            <p style={{marginTop: '1rem'}}>Yönetici tarafından program yayınlandığında burada görünecektir.</p>
                        </div>
                    </div>
                );
            }

            const { physicians, schedule, year, month, daysInMonth, holidays } = publishedData;
            const monthNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
                              'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];

            return (
                <div className="container">
                    <button className="logout-btn" onClick={handleLogout}>Çıkış</button>
                    
                    <div className="header">
                        <h1>🏥 Acil Servis Nöbet Programı</h1>
                        <div className="month-info">{monthNames[month]} {year}</div>
                    </div>

                    <div className="schedule-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Gün</th>
                                    {physicians.map(p => (
                                        <th key={p.name}>{p.displayName || p.name}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
                                    const date = new Date(year, month, day);
                                    const dayNames = ['Paz', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt'];
                                    const dayName = dayNames[date.getDay()];
                                    const isHoliday = holidays && holidays.includes(day);

                                    return (
                                        <tr key={day} className={isHoliday ? 'holiday' : ''}>
                                            <td className="day-header">
                                                {day} {dayName}
                                            </td>
                                            {physicians.map(p => {
                                                const key = `${p.name}-${day}`;
                                                const value = schedule[key] || '';
                                                
                                                let cellContent = '-';
                                                let cellClass = '';
                                                
                                                if (value === '24') {
                                                    cellContent = '24 Saat';
                                                    cellClass = 'shift-24';
                                                } else if (value === '16') {
                                                    cellContent = '16 Saat';
                                                    cellClass = 'shift-16';
                                                } else if (value === '8') {
                                                    cellContent = '8 Saat';
                                                    cellClass = 'shift-8';
                                                } else if (value && value !== '') {
                                                    cellContent = value; // Mazeret kodları
                                                }

                                                return (
                                                    <td key={p.name}>
                                                        {cellContent !== '-' ? (
                                                            <span className={`shift-cell ${cellClass}`}>
                                                                {cellContent}
                                                            </span>
                                                        ) : '-'}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
