<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbet Programı - Görüntüleme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content h1 {
            color: #1F2937;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header-content p {
            color: #6B7280;
            font-size: 1rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout {
            background: #DC2626;
            color: white;
        }

        .btn-logout:hover {
            background: #991B1B;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: white;
            font-size: 1.2rem;
        }

        .no-data {
            background: white;
            padding: 4rem;
            border-radius: 20px;
            text-align: center;
            color: #6B7280;
            font-size: 1.1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .no-data h2 {
            color: #1F2937;
            margin-bottom: 1rem;
        }

        .schedule-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .schedule-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th {
            background: #667eea;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 2px solid #667eea;
        }

        .schedule-table td {
            padding: 0.75rem;
            border-bottom: 1px solid #E5E7EB;
            text-align: center;
            font-weight: 600;
        }

        .schedule-table tr:hover {
            background: #F9FAFB;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }

        .day-cell {
            color: #1F2937;
            min-width: 70px;
            font-weight: 700;
        }

        .shift-cell {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 60px;
        }

        .shift-24 {
            background: #D1FAE5;
            color: #065F46;
        }

        .shift-16 {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .shift-8 {
            background: #FEF3C7;
            color: #92400E;
        }

        .empty-cell {
            color: #9CA3AF;
        }

        .month-info {
            color: #6B7280;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .header-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .header-content h1 {
                font-size: 1.5rem;
            }

            .schedule-table {
                font-size: 0.85rem;
            }

            .schedule-table th,
            .schedule-table td {
                padding: 0.5rem;
            }

            .shift-cell {
                padding: 0.3rem 0.6rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = '';

        function App() {
            const [publishedData, setPublishedData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                checkAuthAndLoadData();
            }, []);

            // Keep-Alive: Render uyku modundan kaçmak için her 4 dakikada /health çağır
            useEffect(() => {
                const keepAlive = setInterval(() => {
                    fetch(`${API_URL}/health`).catch(err => console.log('Keep-alive ping'));
                }, 4 * 60 * 1000); // 4 dakika
                
                return () => clearInterval(keepAlive);
            }, []);

            const checkAuthAndLoadData = async () => {
                try {
                    const authResponse = await fetch(`${API_URL}/api/check-auth`, {
                        credentials: 'include'
                    });
                    const authData = await authResponse.json();
                    
                    if (!authData.authenticated) {
                        window.location.href = 'nobet_login.html';
                        return;
                    }

                    const dataResponse = await fetch(`${API_URL}/api/published`, {
                        credentials: 'include'
                    });
                    const result = await dataResponse.json();
                    
                    if (result.success) {
                        setPublishedData(result.data);
                    }
                } catch (err) {
                    console.error('Hata:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                try {
                    await fetch(`${API_URL}/api/logout`, {
                        method: 'POST',
                        credentials: 'include'
                    });
                    window.location.href = 'nobet_login.html';
                } catch (err) {
                    console.error('Çıkış hatası:', err);
                }
            };

            if (loading) {
                return <div className="loading">⏳ Yükleniyor...</div>;
            }

            if (!publishedData) {
                return (
                    <div className="container">
                        <div className="header">
                            <div className="header-content">
                                <h1>🏥 Acil Servis Nöbet Programı</h1>
                            </div>
                            <div className="header-actions">
                                <button className="btn btn-logout" onClick={handleLogout}>🚪 Çıkış</button>
                            </div>
                        </div>
                        <div className="no-data">
                            <h2>📋 Henüz Yayınlanmış Tablo Yok</h2>
                            <p>Yönetici tarafından nöbet programı yayınlandığında burada görünecektir.</p>
                        </div>
                    </div>
                );
            }

            const { physicians, schedule, year, month, daysInMonth, holidays } = publishedData;
            const monthNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
                              'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            const dayNames = ['Paz', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt'];

            return (
                <div className="container">
                    <div className="header">
                        <div className="header-content">
                            <h1>🏥 Acil Servis Nöbet Programı</h1>
                            <p className="month-info">{monthNames[month]} {year}</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-logout" onClick={handleLogout}>🚪 Çıkış</button>
                        </div>
                    </div>

                    <div className="schedule-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Gün</th>
                                    {physicians.map(p => (
                                        <th key={p.name}>
                                            {p.displayName || p.name}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
                                    const date = new Date(year, month, day);
                                    // Holidays format: "ay-gün" (örn: "0-28")
                                    const holidayKey = `${month}-${day}`;
                                    const isHoliday = holidays && holidays.includes(holidayKey);

                                    return (
                                        <tr key={day} style={isHoliday ? {background: '#F3F4F6'} : {}}>
                                            <td className="day-cell">
                                                {day} {dayNames[date.getDay()]}
                                            </td>
                                            {physicians.map(p => {
                                                const key = `${p.name}-${day}`;
                                                const value = schedule[key] || '';
                                                
                                                let cellContent = '-';
                                                let cellClass = '';
                                                
                                                if (value === '24') {
                                                    cellContent = '24 Saat';
                                                    cellClass = 'shift-24';
                                                } else if (value === '16') {
                                                    cellContent = '16 Saat';
                                                    cellClass = 'shift-16';
                                                } else if (value === '8') {
                                                    cellContent = '8 Saat';
                                                    cellClass = 'shift-8';
                                                } else if (value && value !== '') {
                                                    cellContent = value;
                                                }

                                                return (
                                                    <td key={p.name}>
                                                        {cellClass ? (
                                                            <span className={`shift-cell ${cellClass}`}>
                                                                {cellContent}
                                                            </span>
                                                        ) : (
                                                            <span className="empty-cell">{cellContent}</span>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
