<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbet Programı - Görüntüleme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content h1 {
            color: #1F2937;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .header-content p {
            color: #6B7280;
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-logout {
            background: #DC2626;
            color: white;
        }

        .btn-logout:hover {
            background: #991B1B;
            transform: translateY(-2px);
        }

        .btn-refresh {
            background: #8B5CF6;
            color: white;
        }

        .btn-refresh:hover {
            background: #7C3AED;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.1rem;
        }

        .no-data {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            color: #6B7280;
            font-size: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .no-data h2 {
            color: #1F2937;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        /* Tablo Stilleri */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header {
            padding: 1rem;
            background: #F9FAFB;
            border-bottom: 2px solid #E5E7EB;
            color: #6B7280;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .table-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: #F9FAFB;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 0.875rem 0.75rem;
            text-align: left;
            font-weight: 600;
            color: #374151;
            font-size: 0.85rem;
            border-bottom: 2px solid #E5E7EB;
            background: white;
        }

        th:first-child {
            min-width: 120px;
            padding-left: 1rem;
        }

        th:nth-child(2) {
            min-width: 100px;
        }

        th:nth-child(n+3) {
            min-width: 60px;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #E5E7EB;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #F9FAFB;
        }

        td {
            padding: 0.875rem 0.75rem;
            font-size: 0.9rem;
            color: #374151;
        }

        td:first-child {
            font-weight: 600;
            color: #1F2937;
            padding-left: 1rem;
        }

        td:nth-child(2) {
            color: #6B7280;
            font-size: 0.85rem;
        }

        /* Nöbet Hücreleri */
        .shift-cell {
            text-align: center;
            padding: 0.5rem 0.25rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 2.5rem;
        }

        .shift-cell.empty {
            background: #D1D5DB;
            color: #6B7280;
        }

        .shift-cell.shift-24 {
            color: white;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        .shift-cell.shift-16,
        .shift-cell.shift-8 {
            color: white;
            font-weight: 700;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        /* Ay/Yıl Bilgisi */
        .info-banner {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .info-banner-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .month-year {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1F2937;
        }

        .month-year-subtitle {
            font-size: 0.85rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }

        .info-stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1F2937;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #6B7280;
            text-transform: uppercase;
        }

        .legend {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .legend-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6B7280;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .legend-color {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .legend-empty {
            background: #D1D5DB;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }

            .container {
                padding: 0;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
                padding: 1rem;
            }

            .header-content h1 {
                font-size: 1.2rem;
            }

            .header-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .info-banner {
                padding: 1rem;
            }

            .info-banner-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-stats {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .stat {
                align-items: flex-start;
            }

            th:first-child,
            td:first-child {
                min-width: 100px;
                padding-left: 0.75rem;
            }

            th:nth-child(2),
            td:nth-child(2) {
                min-width: 80px;
            }

            th:nth-child(n+3),
            td:nth-child(n+3) {
                min-width: 50px;
                padding: 0.5rem 0.25rem;
            }

            .shift-cell {
                font-size: 0.75rem;
                height: 2rem;
            }

            .legend-items {
                gap: 1rem;
            }

            .legend-color {
                width: 25px;
                height: 25px;
                font-size: 0.65rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem;
            }

            .header-content h1 {
                font-size: 1rem;
            }

            .month-year {
                font-size: 1rem;
            }

            .info-stats {
                display: none;
            }

            th:first-child,
            td:first-child {
                min-width: 80px;
            }

            th:nth-child(2),
            td:nth-child(2) {
                display: none;
            }

            th:nth-child(n+3),
            td:nth-child(n+3) {
                min-width: 40px;
                padding: 0.4rem 0.2rem;
            }

            .shift-cell {
                font-size: 0.65rem;
                height: 1.75rem;
            }

            table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = '';

        function NobetView() {
            const [isLoading, setIsLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [publishedData, setPublishedData] = useState(null);
            const [error, setError] = useState(null);

            // Sayfa yüklenince auth kontrolü + veri çekme
            useEffect(() => {
                checkAuthAndLoadData();
            }, []);

            const checkAuthAndLoadData = async () => {
                try {
                    // Auth kontrol
                    const authResponse = await fetch(`${API_URL}/api/check-auth`, {
                        credentials: 'include'
                    });
                    const authData = await authResponse.json();

                    if (!authData.authenticated) {
                        window.location.href = 'nobet_login.html';
                        return;
                    }

                    setUser(authData.username);

                    // Yayınlanan tabloyu yükle
                    const pubResponse = await fetch(`${API_URL}/api/published`, {
                        credentials: 'include'
                    });

                    if (pubResponse.ok) {
                        const pubData = await pubResponse.json();
                        if (pubData.success) {
                            setPublishedData(pubData.data);
                        } else {
                            setError('Henüz yayınlanmış tablo yok');
                        }
                    } else {
                        setError('Tablo yüklenemedi');
                    }
                } catch (err) {
                    console.error('Hata:', err);
                    setError('Bağlantı hatası');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogout = async () => {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.href = 'nobet_login.html';
            };

            const handleRefresh = () => {
                setIsLoading(true);
                checkAuthAndLoadData();
            };

            if (isLoading) {
                return <div className="loading">⏳ Yükleniyor...</div>;
            }

            if (error) {
                return (
                    <div className="container">
                        <div className="header">
                            <div className="header-content">
                                <h1>🏥 Nöbet Programı</h1>
                            </div>
                            <div className="header-actions">
                                <button className="btn btn-logout" onClick={handleLogout}>
                                    Çıkış
                                </button>
                            </div>
                        </div>
                        <div className="no-data">
                            <h2>⚠️ {error}</h2>
                            <p>Yönetici nöbet programını henüz yayınlamadı.</p>
                            <button className="btn btn-refresh" onClick={handleRefresh} style={{marginTop: '1rem'}}>
                                🔄 Yenile
                            </button>
                        </div>
                    </div>
                );
            }

            if (!publishedData) {
                return <div className="loading">📊 Veri bekleniyor...</div>;
            }

            const { physicians = [], schedule = {}, year = 2026, month = 0, daysInMonth = 31 } = publishedData;

            const monthNames = ['OCAK', 'ŞUBAT', 'MART', 'NİSAN', 'MAYIS', 'HAZİRAN',
                              'TEMMUZ', 'AĞUSTOS', 'EYLÜL', 'EKİM', 'KASIM', 'ARALIK'];

            // Tablo verisini oluştur
            const days = Array.from({length: daysInMonth}, (_, i) => i + 1);

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <div className="header-content">
                            <h1>🏥 Nöbet Programı</h1>
                            <p>👤 {user}</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-refresh" onClick={handleRefresh}>
                                🔄 Yenile
                            </button>
                            <button className="btn btn-logout" onClick={handleLogout}>
                                Çıkış
                            </button>
                        </div>
                    </div>

                    {/* Ay/Yıl Bilgisi */}
                    <div className="info-banner">
                        <div className="info-banner-content">
                            <div>
                                <div className="month-year">{monthNames[month]} {year}</div>
                                <div className="month-year-subtitle">Nöbet Programı</div>
                            </div>
                            <div className="info-stats">
                                <div className="stat">
                                    <div className="stat-value">{physicians.length}</div>
                                    <div className="stat-label">Hekim</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">{daysInMonth}</div>
                                    <div className="stat-label">Gün</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Legend */}
                    <div className="legend">
                        <div className="legend-title">Renk Kodları</div>
                        <div className="legend-items">
                            {physicians.slice(0, 4).map(p => (
                                <div key={p.name} className="legend-item">
                                    <div className="legend-color" style={{background: p.color}}>
                                        24
                                    </div>
                                    <span>{p.displayName}</span>
                                </div>
                            ))}
                            <div className="legend-item">
                                <div className="legend-color legend-empty">—</div>
                                <span>Nöbet Yok</span>
                            </div>
                        </div>
                    </div>

                    {/* Tablo */}
                    <div className="table-wrapper">
                        <div className="table-header">
                            <div className="table-header-content">
                                <span>📋 {monthNames[month]} {year} Nöbet Programı</span>
                            </div>
                        </div>
                        <div className="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Hekim</th>
                                        <th>Gün Adı</th>
                                        {days.map(day => (
                                            <th key={day}>{day}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {physicians.map(physician => (
                                        <tr key={physician.name}>
                                            <td>{physician.displayName}</td>
                                            <td style={{fontSize: '0.8rem'}}>{physician.title}</td>
                                            {days.map(day => {
                                                const key = `${physician.name}-${day}`;
                                                const value = schedule[key] || '';

                                                let cellContent = '';
                                                let cellClass = 'shift-cell empty';
                                                let cellStyle = {background: '#D1D5DB', color: '#6B7280'};

                                                if (value === '24') {
                                                    cellContent = '';
                                                    cellClass = 'shift-cell shift-24';
                                                    cellStyle = {background: physician.color, color: 'white'};
                                                } else if (value === '16' || value === '8') {
                                                    cellContent = value;
                                                    cellClass = value === '16' ? 'shift-cell shift-16' : 'shift-cell shift-8';
                                                    cellStyle = {background: physician.color, color: 'white'};
                                                } else if (value === '' || value === '-') {
                                                    cellContent = '';
                                                    cellClass = 'shift-cell empty';
                                                    cellStyle = {background: '#D1D5DB', color: '#6B7280'};
                                                }

                                                return (
                                                    <td key={key} style={{padding: '0.4rem 0.25rem', textAlign: 'center'}}>
                                                        <div className={cellClass} style={cellStyle}>
                                                            {cellContent}
                                                        </div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NobetView />);
    </script>
</body>
</html>
