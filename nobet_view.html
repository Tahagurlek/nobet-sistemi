<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nöbet Programı - Görüntüleme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-content h1 {
            color: #1F2937;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .header-content p {
            color: #6B7280;
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-logout {
            background: #DC2626;
            color: white;
        }

        .btn-logout:hover {
            background: #991B1B;
        }

        .btn-refresh {
            background: #8B5CF6;
            color: white;
        }

        .btn-refresh:hover {
            background: #7C3AED;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.1rem;
            background: white;
            border-radius: 12px;
        }

        .no-data {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            color: #6B7280;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .no-data h2 {
            color: #1F2937;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        /* Tablo Wrapper */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .table-title {
            padding: 1rem 1.5rem;
            background: #F9FAFB;
            border-bottom: 1px solid #E5E7EB;
            font-weight: 600;
            color: #1F2937;
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overflow-y: visible;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 0.75rem 0.5rem;
            text-align: center;
            font-weight: 700;
            color: white;
            font-size: 0.85rem;
            border: 1px solid #DDD;
            min-width: 70px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            word-wrap: break-word;
        }

        th:first-child {
            min-width: 100px;
            background: #F9FAFB;
            color: #1F2937;
            font-weight: 600;
            position: sticky;
            left: 0;
            z-index: 11;
        }

        tbody {
            background: white;
        }

        tbody tr {
            border-bottom: 1px solid #E5E7EB;
        }

        tbody tr:hover {
            background: #FAFAFA;
        }

        td {
            padding: 0;
            text-align: center;
            font-size: 0.9rem;
            color: #374151;
            border: 1px solid #E5E7EB;
            min-width: 70px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        td:first-child {
            text-align: left;
            padding: 0 0.75rem;
            background: #F9FAFB;
            color: #1F2937;
            font-weight: 500;
            font-size: 0.85rem;
            min-width: 100px;
            position: sticky;
            left: 0;
            z-index: 10;
        }

        /* Hücre İçeriği */
        .cell-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: 600;
        }

        .cell-empty {
            background: white;
            color: transparent;
        }

        .cell-excuse {
            background: #D1D5DB;
            color: #6B7280;
        }

        .cell-shift-24 {
            color: white;
        }

        .cell-shift-16,
        .cell-shift-8 {
            color: white;
            font-weight: 700;
        }

        /* Info Banner */
        .info-banner {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .month-year {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1F2937;
        }

        .month-year-subtitle {
            font-size: 0.85rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 1rem;
            }

            th {
                min-width: 60px;
                height: 50px;
                font-size: 0.75rem;
            }

            th:first-child {
                min-width: 80px;
            }

            td {
                min-width: 60px;
                height: 45px;
            }

            td:first-child {
                min-width: 80px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }

            .header {
                padding: 0.75rem;
            }

            .header-content h1 {
                font-size: 1.1rem;
            }

            th {
                min-width: 50px;
                height: 45px;
                font-size: 0.7rem;
            }

            th:first-child {
                min-width: 70px;
            }

            td {
                min-width: 50px;
                height: 40px;
                font-size: 0.8rem;
            }

            td:first-child {
                min-width: 70px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = '';

        function NobetView() {
            const [isLoading, setIsLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [publishedData, setPublishedData] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                checkAuthAndLoadData();
            }, []);

            const checkAuthAndLoadData = async () => {
                try {
                    const authResponse = await fetch(`${API_URL}/api/check-auth`, {
                        credentials: 'include'
                    });
                    const authData = await authResponse.json();

                    if (!authData.authenticated) {
                        window.location.href = 'nobet_login.html';
                        return;
                    }

                    setUser(authData.username);

                    const pubResponse = await fetch(`${API_URL}/api/published`, {
                        credentials: 'include'
                    });

                    if (pubResponse.ok) {
                        const pubData = await pubResponse.json();
                        if (pubData.success) {
                            setPublishedData(pubData.data);
                        } else {
                            setError('Henüz yayınlanmış tablo yok');
                        }
                    } else {
                        setError('Tablo yüklenemedi');
                    }
                } catch (err) {
                    console.error('Hata:', err);
                    setError('Bağlantı hatası');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogout = async () => {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.href = 'nobet_login.html';
            };

            const handleRefresh = () => {
                setIsLoading(true);
                checkAuthAndLoadData();
            };

            if (isLoading) {
                return <div className="loading">⏳ Yükleniyor...</div>;
            }

            if (error) {
                return (
                    <div className="container">
                        <div className="header">
                            <div className="header-content">
                                <h1>🏥 Nöbet Programı</h1>
                            </div>
                            <div className="header-actions">
                                <button className="btn btn-logout" onClick={handleLogout}>
                                    Çıkış
                                </button>
                            </div>
                        </div>
                        <div className="no-data">
                            <h2>⚠️ {error}</h2>
                            <p>Yönetici nöbet programını henüz yayınlamadı.</p>
                            <button className="btn btn-refresh" onClick={handleRefresh} style={{marginTop: '1rem'}}>
                                🔄 Yenile
                            </button>
                        </div>
                    </div>
                );
            }

            if (!publishedData) {
                return <div className="loading">📊 Veri bekleniyor...</div>;
            }

            const { physicians = [], schedule = {}, year = 2026, month = 0, daysInMonth = 31, holidays = [] } = publishedData;
            const monthNames = ['OCAK', 'ŞUBAT', 'MART', 'NİSAN', 'MAYIS', 'HAZİRAN',
                              'TEMMUZ', 'AĞUSTOS', 'EYLÜL', 'EKİM', 'KASIM', 'ARALIK'];

            const days = Array.from({length: daysInMonth}, (_, i) => i + 1);
            const excuseCodes = ['YI', 'R', 'EV', 'EI', 'GO', 'MI', 'OI', 'RI', 'SEI', 'KI', 'IK', 'II', 'SI', 'B', 'I', 'X'];

            const formatDate = (day) => {
                const date = new Date(year, month, day);
                const d = String(date.getDate()).padStart(2, '0');
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const dayNames = ['PAZ', 'PTZ', 'SAL', 'ÇAR', 'PER', 'CUM', 'CMT'];
                return `${d}.${m} ${dayNames[date.getDay()]}`;
            };

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <div className="header-content">
                            <h1>🏥 Nöbet Programı</h1>
                            <p>👤 {user}</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-refresh" onClick={handleRefresh}>
                                🔄 Yenile
                            </button>
                            <button className="btn btn-logout" onClick={handleLogout}>
                                Çıkış
                            </button>
                        </div>
                    </div>

                    {/* Info Banner */}
                    <div className="info-banner">
                        <div className="month-year">{monthNames[month]} {year} Nöbet Programı</div>
                        <div className="month-year-subtitle">Nöbet Yönetim Sistemi</div>
                    </div>

                    {/* Tablo */}
                    <div className="table-wrapper">
                        <div className="table-title">
                            📋 {monthNames[month]} {year} Nöbet Programı
                        </div>
                        <div className="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Tarih</th>
                                        {physicians.map(physician => (
                                            <th key={physician.name} style={{background: physician.color}}>
                                                {physician.displayName}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {days.map(day => (
                                        <tr key={day}>
                                            <td>{formatDate(day)}</td>
                                            {physicians.map(physician => {
                                                const key = `${physician.name}-${day}`;
                                                const value = schedule[key] || '';

                                                let cellStyle = {};
                                                let cellClass = 'cell-content cell-empty';
                                                let cellContent = '';

                                                if (excuseCodes.includes(value)) {
                                                    cellClass = 'cell-content cell-excuse';
                                                    cellContent = '';
                                                } else if (value === '24') {
                                                    cellClass = 'cell-content cell-shift-24';
                                                    cellStyle = {background: physician.color};
                                                    cellContent = '';
                                                } else if (value === '16') {
                                                    cellClass = 'cell-content cell-shift-16';
                                                    cellStyle = {background: physician.color};
                                                    cellContent = '16';
                                                } else if (value === '8') {
                                                    cellClass = 'cell-content cell-shift-8';
                                                    cellStyle = {background: physician.color};
                                                    cellContent = '8';
                                                } else {
                                                    cellClass = 'cell-content cell-empty';
                                                }

                                                return (
                                                    <td key={key}>
                                                        <div className={cellClass} style={cellStyle}>
                                                            {cellContent}
                                                        </div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NobetView />);
    </script>
</body>
</html>
